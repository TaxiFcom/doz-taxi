<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOZ - Rider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
/* ===== RIDER APP STYLES ===== */
html, body { height: 100%; overflow: hidden; }
body { display: flex; flex-direction: column; background: var(--doz-surface-2); }

/* ===== AUTH SCREEN ===== */
.auth-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: 24px; background: var(--doz-primary);
  position: relative; overflow: hidden;
}
.auth-screen::before {
  content: ''; position: absolute; top: -40%; right: -30%;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,83,0.15) 0%, transparent 70%);
}
.auth-screen::after {
  content: ''; position: absolute; bottom: -20%; left: -20%;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,83,0.08) 0%, transparent 70%);
}
.auth-logo {
  position: relative; z-index: 1; margin-bottom: 8px;
}
.auth-logo svg { width: 80px; height: 80px; }
.auth-brand {
  font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -0.5px;
  position: relative; z-index: 1; margin-bottom: 4px;
}
.auth-subtitle {
  font-size: 0.875rem; color: rgba(255,255,255,0.5); margin-bottom: 32px;
  position: relative; z-index: 1;
}
.auth-card {
  width: 100%; max-width: 400px; background: var(--doz-surface);
  border-radius: var(--doz-radius); padding: 28px;
  box-shadow: var(--doz-shadow-lg);
  position: relative; z-index: 1;
}
.auth-tabs {
  display: flex; gap: 4px; background: var(--doz-bg);
  border-radius: var(--doz-radius-sm); padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 8px; border: none; background: none;
  border-radius: calc(var(--doz-radius-sm) - 2px);
  cursor: pointer; font-size: 0.875rem; font-weight: 600;
  color: var(--doz-text-2); transition: all 0.15s;
  font-family: inherit;
}
.auth-tab.active { background: var(--doz-surface); color: var(--doz-text); box-shadow: var(--doz-shadow); }
.auth-form { display: none; }
.auth-form.active { display: block; }
.auth-error {
  background: rgba(255,61,61,0.08); color: var(--doz-danger);
  padding: 10px 14px; border-radius: var(--doz-radius-sm);
  font-size: 0.8125rem; font-weight: 500; margin-bottom: 16px; display: none;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  display: flex; background: var(--doz-surface);
  border-top: 1px solid var(--doz-border);
  flex-shrink: 0; position: relative; z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 4px; background: none; border: none;
  cursor: pointer; font-family: inherit;
  color: var(--doz-text-3); transition: color 0.15s;
  font-size: 0.625rem; font-weight: 600; gap: 3px;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--doz-primary); }
.nav-btn svg { flex-shrink: 0; }

/* ===== SCREENS ===== */
.screen {
  flex: 1; overflow-y: auto; display: none;
  flex-direction: column;
}
.screen.active { display: flex; }

/* ===== HOME SCREEN ===== */
.home-map-area {
  background: linear-gradient(135deg, #0A1628 0%, #152238 100%);
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  min-height: 240px;
}
.map-placeholder {
  text-align: center; color: rgba(255,255,255,0.4);
}
.map-placeholder svg { opacity: 0.3; margin-bottom: 8px; }
.map-placeholder p { font-size: 0.8125rem; }
.ride-panel {
  background: var(--doz-surface); padding: 20px;
  border-top: 1px solid var(--doz-border);
}
.ride-panel h2 {
  font-size: 1rem; font-weight: 700; color: var(--doz-text);
  margin-bottom: 14px;
}
.location-inputs { margin-bottom: 14px; }
.loc-input-wrap {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--doz-bg);
  border-radius: var(--doz-radius-sm); margin-bottom: 8px;
  border: 1px solid var(--doz-border);
}
.loc-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.loc-dot.origin { background: var(--doz-primary); }
.loc-dot.dest { background: var(--doz-danger); }
.loc-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--doz-text); font-size: 0.9375rem;
  font-family: inherit;
}
.loc-input::placeholder { color: var(--doz-text-3); }
.ride-options { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.ride-option {
  flex-shrink: 0; padding: 8px 16px; border-radius: 100px;
  background: var(--doz-bg); border: 1px solid var(--doz-border);
  cursor: pointer; font-size: 0.8125rem; font-weight: 600;
  color: var(--doz-text-2); transition: all 0.15s;
  font-family: inherit;
}
.ride-option.selected { background: var(--doz-primary); color: #000; border-color: var(--doz-primary); }
.fare-estimate {
  font-size: 0.875rem; color: var(--doz-text-2); margin-bottom: 14px;
  display: none;
}
.fare-estimate span { color: var(--doz-primary); font-weight: 700; }

/* ===== TRIP STATUS ===== */
.trip-status-screen {
  position: fixed; inset: 0; background: var(--doz-bg);
  z-index: 100; display: none; flex-direction: column;
}
.trip-status-screen.active { display: flex; }
.trip-map-area {
  background: linear-gradient(135deg, #0A1628 0%, #1a2f50 100%);
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.trip-map-pulse {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,200,0,0.15);
  display: flex; align-items: center; justify-content: center;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.8; }
}
.trip-info-panel {
  background: var(--doz-surface);
  padding: 20px; border-top: 1px solid var(--doz-border);
}
.trip-driver-info {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.trip-driver-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--doz-primary);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.125rem; color: #000; flex-shrink: 0;
}
.trip-driver-details { flex: 1; }
.trip-driver-name { font-weight: 700; color: var(--doz-text); }
.trip-driver-car { font-size: 0.8125rem; color: var(--doz-text-3); }
.trip-status-label {
  text-align: center; padding: 12px;
  background: var(--doz-bg); border-radius: var(--doz-radius-sm);
  margin-bottom: 12px;
}
.trip-status-label span {
  font-weight: 700; color: var(--doz-primary);
}

/* ===== TRIPS HISTORY ===== */
.screen-header {
  padding: 20px 20px 0; flex-shrink: 0;
}
.screen-title {
  font-size: 1.125rem; font-weight: 700; color: var(--doz-text);
  margin-bottom: 16px;
}
.trip-history-item {
  background: var(--doz-surface); border-bottom: 1px solid var(--doz-border);
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
}
.trip-hist-icon {
  width: 40px; height: 40px; border-radius: var(--doz-radius-sm);
  background: rgba(255,200,0,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.trip-hist-info { flex: 1; min-width: 0; }
.trip-hist-route {
  font-weight: 600; font-size: 0.9375rem; color: var(--doz-text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.trip-hist-meta { font-size: 0.8125rem; color: var(--doz-text-3); margin-top: 2px; }
.trip-hist-fare {
  font-weight: 700; color: var(--doz-text); font-size: 0.9375rem;
  flex-shrink: 0;
}

/* ===== PROFILE ===== */
.profile-header {
  background: var(--doz-primary);
  padding: 32px 20px 24px;
  text-align: center; flex-shrink: 0;
}
.profile-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; font-weight: 700; color: #000;
  margin: 0 auto 12px;
}
.profile-name { font-size: 1.25rem; font-weight: 700; color: #000; }
.profile-phone { font-size: 0.875rem; color: rgba(0,0,0,0.6); margin-top: 4px; }
.profile-body { padding: 20px; flex: 1; overflow-y: auto; }
.profile-section { margin-bottom: 24px; }
.profile-section-title {
  font-size: 0.75rem; font-weight: 600; color: var(--doz-text-3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
}
.profile-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid var(--doz-border);
}
.profile-item:last-child { border-bottom: none; }
.profile-item-icon {
  width: 36px; height: 36px; border-radius: var(--doz-radius-sm);
  background: var(--doz-bg);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--doz-text-2);
}
.profile-item-text { flex: 1; }
.profile-item-label { font-size: 0.9375rem; color: var(--doz-text); font-weight: 500; }
.profile-item-value { font-size: 0.8125rem; color: var(--doz-text-3); margin-top: 2px; }
.profile-item-arrow { color: var(--doz-text-3); }

/* ===== WALLET ===== */
.wallet-balance {
  background: linear-gradient(135deg, var(--doz-primary) 0%, #e6b400 100%);
  margin: 20px; border-radius: var(--doz-radius); padding: 24px;
  text-align: center;
}
.wallet-balance-label { font-size: 0.875rem; color: rgba(0,0,0,0.6); margin-bottom: 4px; }
.wallet-balance-amount { font-size: 2rem; font-weight: 800; color: #000; }
.wallet-transactions { padding: 0 20px; }
.wallet-tx {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid var(--doz-border);
}
.wallet-tx:last-child { border-bottom: none; }
.wallet-tx-icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wallet-tx-icon.credit { background: rgba(34,197,94,0.12); color: #22c55e; }
.wallet-tx-icon.debit  { background: rgba(255,61,61,0.12);  color: #ff3d3d; }
.wallet-tx-info { flex: 1; }
.wallet-tx-desc { font-weight: 500; color: var(--doz-text); font-size: 0.9375rem; }
.wallet-tx-date { font-size: 0.8125rem; color: var(--doz-text-3); margin-top: 2px; }
.wallet-tx-amount { font-weight: 700; font-size: 0.9375rem; flex-shrink: 0; }
.wallet-tx-amount.credit { color: #22c55e; }
.wallet-tx-amount.debit  { color: #ff3d3d; }
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="10" fill="rgba(0,0,0,0.3)"/>
      <path d="M10 28 L18 12 L22 20 L26 14 L30 28 Z" fill="#fff" stroke="none"/>
      <circle cx="20" cy="20" r="3" fill="#FFC800"/>
    </svg>
  </div>
  <div class="auth-brand">DOZ</div>
  <div class="auth-subtitle">تنقل ذكي في خطوة واحدة</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">تسجيل الدخول</button>
      <button class="auth-tab" data-tab="register">حساب جديد</button>
    </div>
    <!-- Login -->
    <div class="auth-form active" id="loginForm">
      <div class="auth-error" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-input" id="loginPhone" autocomplete="tel" dir="ltr">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" id="loginPassword" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-block" id="loginBtn">دخول</button>
    </div>
    <!-- Register -->
    <div class="auth-form" id="registerForm">
      <div class="auth-error" id="registerError"></div>
      <div class="form-group">
        <label class="form-label">الاسم</label>
        <input type="text" class="form-input" id="regName" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-input" id="regPhone" autocomplete="tel" dir="ltr">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-input" id="regPassword" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-block" id="registerBtn">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div id="appShell" style="display:none; flex-direction:column; height:100%; flex:1;">

  <!-- ===== HOME SCREEN ===== -->
  <div class="screen active" id="screen-home">
    <div class="home-map-area">
      <div class="map-placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <p>تحديد موقعك</p>
      </div>
    </div>
    <div class="ride-panel">
      <h2>إلى أين تريد الذهاب؟</h2>
      <div class="location-inputs">
        <div class="loc-input-wrap">
          <div class="loc-dot origin"></div>
          <input class="loc-input" type="text" id="pickupInput" placeholder="موقعك الحالي">
        </div>
        <div class="loc-input-wrap">
          <div class="loc-dot dest"></div>
          <input class="loc-input" type="text" id="destInput" placeholder="وجهتك">
        </div>
      </div>
      <div class="ride-options">
        <button class="ride-option selected" data-type="standard">عادي</button>
        <button class="ride-option" data-type="premium">مميز</button>
        <button class="ride-option" data-type="xl">مرحبة XL</button>
      </div>
      <div class="fare-estimate" id="fareEstimate">التقدير: <span id="fareAmount">-</span></div>
      <button class="btn btn-primary btn-block" id="bookRideBtn">حجز رحلة</button>
    </div>
  </div>

  <!-- ===== TRIPS SCREEN ===== -->
  <div class="screen" id="screen-trips">
    <div class="screen-header">
      <div class="screen-title">رحلاتي</div>
    </div>
    <div id="tripsHistoryList" style="flex:1; overflow-y:auto;"></div>
  </div>

  <!-- ===== WALLET SCREEN ===== -->
  <div class="screen" id="screen-wallet">
    <div class="screen-header" style="padding-top:20px">
      <div class="screen-title">محفظتي</div>
    </div>
    <div class="wallet-balance">
      <div class="wallet-balance-label">رصيدك</div>
      <div class="wallet-balance-amount" id="walletBalance">0.00 ﷼</div>
    </div>
    <div class="wallet-transactions">
      <div class="profile-section-title" style="padding-top:16px">المعاملات</div>
      <div id="walletTxList"></div>
    </div>
  </div>

  <!-- ===== PROFILE SCREEN ===== -->
  <div class="screen" id="screen-profile">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-name" id="profileName">-</div>
      <div class="profile-phone" id="profilePhone">-</div>
    </div>
    <div class="profile-body">
      <div class="profile-section">
        <div class="profile-section-title">خيارات الحساب</div>
        <div class="profile-item" id="editProfileItem" style="cursor:pointer">
          <div class="profile-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="profile-item-text">
            <div class="profile-item-label">المعلومات الشخصية</div>
            <div class="profile-item-value">الاسم ورقم الهاتف</div>
          </div>
          <svg class="profile-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="profile-item" id="changePasswordItem" style="cursor:pointer">
          <div class="profile-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <div class="profile-item-text">
            <div class="profile-item-label">تغيير كلمة المرور</div>
          </div>
          <svg class="profile-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
      </div>
      <div class="profile-section">
        <div class="profile-section-title">متفرقات</div>
        <div class="profile-item" style="cursor:pointer" onclick="App.navigate('wallet')">
          <div class="profile-item-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </div>
          <div class="profile-item-text">
            <div class="profile-item-label">محفظتي</div>
          </div>
          <svg class="profile-item-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
      </div>
      <button class="btn btn-ghost btn-block" id="logoutBtn" style="margin-top:8px">خروج</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      رئيسي
    </button>
    <button class="nav-btn" data-screen="trips">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      رحلاتي
    </button>
    <button class="nav-btn" data-screen="wallet">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      محفظتي
    </button>
    <button class="nav-btn" data-screen="profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      حسابي
    </button>
  </nav>

  <!-- Trip Status Overlay -->
  <div class="trip-status-screen" id="tripStatusScreen">
    <div class="trip-map-area">
      <div class="trip-map-pulse">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#FFC800" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
    </div>
    <div class="trip-info-panel">
      <div class="trip-status-label">حالة الرحلة: <span id="tripStatusText">جاري البحث عن سائق...</span></div>
      <div class="trip-driver-info" id="tripDriverInfo" style="display:none">
        <div class="trip-driver-avatar" id="tripDriverAvatar">?</div>
        <div class="trip-driver-details">
          <div class="trip-driver-name" id="tripDriverName">-</div>
          <div class="trip-driver-car" id="tripDriverCar">-</div>
        </div>
      </div>
      <button class="btn btn-danger btn-block" id="cancelTripBtn">إلغاء الرحلة</button>
    </div>
  </div>

</div><!-- /appShell -->

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editProfileModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">تعديل الملف الشخصي</span>
      <button class="btn btn-ghost" onclick="closeModal('editProfileModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">الاسم</label>
        <input type="text" class="form-input" id="editName">
      </div>
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <input type="tel" class="form-input" id="editPhone" dir="ltr">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editProfileModal')">إلغاء</button>
      <button class="btn btn-primary" id="saveProfileBtn">حفظ</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
'use strict';
const API = window.DOZ_API;

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

const DOZ = {
  token: null,
  user: null,
  currentTrip: null,
  pollInterval: null,
  selectedType: 'standard',

  init() {
    const t = localStorage.getItem('doz_rider_token');
    const u = localStorage.getItem('doz_rider_user');
    if (t && u) {
      this.token = t;
      this.user = JSON.parse(u);
    }
  },

  isLoggedIn() { return !!this.token; },

  headers() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token };
  }
};

DOZ.init();

// ===== AUTH =====
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  loadProfile();
}

// Tabs
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
  });
});

// Login
document.getElementById('loginBtn').addEventListener('click', async () => {
  const phone    = document.getElementById('loginPhone').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {
    const data = await API.post('/auth/rider/login', { phone, password });
    DOZ.token = data.token;
    DOZ.user  = data.user;
    localStorage.setItem('doz_rider_token', DOZ.token);
    localStorage.setItem('doz_rider_user', JSON.stringify(DOZ.user));
    showApp();
  } catch(e) {
    errEl.textContent = e.message || 'خطأ في بيانات الدخول';
    errEl.style.display = 'block';
  }
});

// Register
document.getElementById('registerBtn').addEventListener('click', async () => {
  const name     = document.getElementById('regName').value.trim();
  const phone    = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl    = document.getElementById('registerError');
  errEl.style.display = 'none';
  if (!name || !phone || !password) {
    errEl.textContent = 'يرجى ملء جميع الحقول';
    errEl.style.display = 'block'; return;
  }
  try {
    const data = await API.post('/auth/rider/register', { name, phone, password });
    DOZ.token = data.token;
    DOZ.user  = data.user;
    localStorage.setItem('doz_rider_token', DOZ.token);
    localStorage.setItem('doz_rider_user', JSON.stringify(DOZ.user));
    showApp();
  } catch(e) {
    errEl.textContent = e.message || 'خطأ في إنشاء الحساب';
    errEl.style.display = 'block';
  }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', () => {
  DOZ.token = null; DOZ.user = null;
  localStorage.removeItem('doz_rider_token');
  localStorage.removeItem('doz_rider_user');
  showAuth();
});

// ===== NAVIGATION =====
const App = { navigate(screen) { activateScreen(screen); activateNav(screen); } };

function activateScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const s = document.getElementById('screen-' + name);
  if (s) s.classList.add('active');
  if (name === 'trips')   loadTripsHistory();
  if (name === 'wallet')  loadWallet();
  if (name === 'profile') loadProfile();
}
function activateNav(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const b = document.querySelector(`.nav-btn[data-screen="${name}"]`);
  if (b) b.classList.add('active');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activateScreen(btn.dataset.screen);
    activateNav(btn.dataset.screen);
  });
});

// ===== HOME / BOOKING =====
document.querySelectorAll('.ride-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.ride-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    DOZ.selectedType = opt.dataset.type;
  });
});

const destInput = document.getElementById('destInput');
destInput.addEventListener('input', () => {
  if (destInput.value.trim().length > 2) {
    document.getElementById('fareEstimate').style.display = 'block';
    document.getElementById('fareAmount').textContent = 'تقديري...';
    setTimeout(() => {
      const base = DOZ.selectedType === 'standard' ? 15 : DOZ.selectedType === 'premium' ? 25 : 30;
      const est  = (base + Math.random() * 10).toFixed(2);
      document.getElementById('fareAmount').textContent = est + ' ﷼';
    }, 600);
  }
});

document.getElementById('bookRideBtn').addEventListener('click', async () => {
  const pickup = document.getElementById('pickupInput').value.trim();
  const dest   = document.getElementById('destInput').value.trim();
  if (!pickup || !dest) { toast('يرجى تحديد نقطة الالتقاط والوجهة', 'error'); return; }
  try {
    const trip = await API.post('/trips', {
      pickup_address: pickup, dropoff_address: dest, ride_type: DOZ.selectedType
    }, DOZ.headers());
    DOZ.currentTrip = trip;
    showTripStatus();
    pollTrip(trip.id);
  } catch(e) { toast(e.message, 'error'); }
});

function showTripStatus() {
  const s = document.getElementById('tripStatusScreen');
  s.classList.add('active');
  document.getElementById('tripDriverInfo').style.display = 'none';
  document.getElementById('tripStatusText').textContent = 'جاري البحث عن سائق...';
}

function pollTrip(tripId) {
  if (DOZ.pollInterval) clearInterval(DOZ.pollInterval);
  DOZ.pollInterval = setInterval(async () => {
    try {
      const trip = await API.get(`/trips/${tripId}`, DOZ.headers());
      updateTripStatus(trip);
      if (['completed','cancelled'].includes(trip.status)) {
        clearInterval(DOZ.pollInterval);
        DOZ.pollInterval = null;
        setTimeout(() => {
          document.getElementById('tripStatusScreen').classList.remove('active');
          if (trip.status === 'completed') toast('وصلت إلى وجهتك! شكراً لاختيارك DOZ');
        }, 2000);
      }
    } catch(e) {}
  }, 3000);
}

function updateTripStatus(trip) {
  const statusMap = {
    pending:  'جاري البحث عن سائق...',
    accepted: 'سائق في الطريق إليك!',
    arrived:  'السائق وصل!',
    active:   'الرحلة جارية...',
    completed:'تمت الرحلة',
    cancelled:'تم إلغاء الرحلة'
  };
  document.getElementById('tripStatusText').textContent = statusMap[trip.status] || trip.status;
  if (trip.driver_id) {
    document.getElementById('tripDriverInfo').style.display = 'flex';
    document.getElementById('tripDriverAvatar').textContent = (trip.driver_name||'?')[0].toUpperCase();
    document.getElementById('tripDriverName').textContent = trip.driver_name || '-';
    document.getElementById('tripDriverCar').textContent  = trip.driver_car  || '';
  }
}

document.getElementById('cancelTripBtn').addEventListener('click', async () => {
  if (!DOZ.currentTrip) return;
  try {
    await API.put(`/trips/${DOZ.currentTrip.id}`, { status: 'cancelled' }, DOZ.headers());
    if (DOZ.pollInterval) { clearInterval(DOZ.pollInterval); DOZ.pollInterval = null; }
    document.getElementById('tripStatusScreen').classList.remove('active');
    toast('تم إلغاء الرحلة');
  } catch(e) { toast(e.message, 'error'); }
});

// ===== TRIPS HISTORY =====
async function loadTripsHistory() {
  const list = document.getElementById('tripsHistoryList');
  list.innerHTML = '<p style="text-align:center;padding:24px;color:var(--doz-text-3)">جاري التحميل...</p>';
  try {
    const trips = await API.get('/rider/trips', DOZ.headers());
    if (!trips.length) {
      list.innerHTML = '<p style="text-align:center;padding:24px;color:var(--doz-text-3)">لا توجد رحلات</p>';
      return;
    }
    list.innerHTML = trips.map(t => `
      <div class="trip-history-item">
        <div class="trip-hist-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFC800" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="trip-hist-info">
          <div class="trip-hist-route">${t.pickup_address || '-'} ← ${t.dropoff_address || '-'}</div>
          <div class="trip-hist-meta">${new Date(t.created_at).toLocaleDateString('ar')} · ${t.status}</div>
        </div>
        <div class="trip-hist-fare">${t.fare ? t.fare.toFixed(2) + ' ﷼' : '-'}</div>
      </div>
    `).join('');
  } catch(e) { list.innerHTML = '<p style="text-align:center;padding:24px;color:var(--doz-danger)">' + e.message + '</p>'; }
}

// ===== WALLET =====
async function loadWallet() {
  try {
    const data = await API.get('/rider/wallet', DOZ.headers());
    document.getElementById('walletBalance').textContent = (data.balance||0).toFixed(2) + ' ﷼';
    const txList = document.getElementById('walletTxList');
    const txs = data.transactions || [];
    if (!txs.length) { txList.innerHTML = '<p style="color:var(--doz-text-3);text-align:center;padding:16px">لا توجد معاملات</p>'; return; }
    txList.innerHTML = txs.map(tx => `
      <div class="wallet-tx">
        <div class="wallet-tx-icon ${tx.type}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            ${tx.type === 'credit'
              ? '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>'
              : '<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>'}
          </svg>
        </div>
        <div class="wallet-tx-info">
          <div class="wallet-tx-desc">${tx.description || '-'}</div>
          <div class="wallet-tx-date">${new Date(tx.created_at).toLocaleDateString('ar')}</div>
        </div>
        <div class="wallet-tx-amount ${tx.type}">
          ${tx.type === 'credit' ? '+' : '-'}${tx.amount.toFixed(2)} ﷼
        </div>
      </div>
    `).join('');
  } catch(e) {}
}

// ===== PROFILE =====
async function loadProfile() {
  if (!DOZ.user) return;
  const name = DOZ.user.name || '-';
  document.getElementById('profileAvatar').textContent = name[0].toUpperCase();
  document.getElementById('profileName').textContent   = name;
  document.getElementById('profilePhone').textContent  = DOZ.user.phone || '-';
}

document.getElementById('editProfileItem').addEventListener('click', () => {
  document.getElementById('editName').value  = DOZ.user?.name  || '';
  document.getElementById('editPhone').value = DOZ.user?.phone || '';
  document.getElementById('editProfileModal').classList.add('open');
});

document.getElementById('saveProfileBtn').addEventListener('click', async () => {
  const name  = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  try {
    const updated = await API.put('/rider/profile', { name, phone }, DOZ.headers());
    DOZ.user = { ...DOZ.user, ...updated };
    localStorage.setItem('doz_rider_user', JSON.stringify(DOZ.user));
    loadProfile();
    closeModal('editProfileModal');
    toast('تم تحديث الملف الشخصي');
  } catch(e) { toast(e.message, 'error'); }
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  if (DOZ.isLoggedIn()) {
    showApp();
  } else {
    showAuth();
  }
});
</script>
</body>
</html>
