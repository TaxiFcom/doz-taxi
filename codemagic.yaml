workflows:
  doz-rider-android:
    name: DOZ Rider Android
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: |
          cd packages/doz_rider
          flutter pub get
      - name: Build APK
        script: |
          cd packages/doz_rider
          flutter build apk --release
    artifacts:
      - packages/doz_rider/build/app/outputs/flutter-apk/*.apk
